<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活动报名 · Demo</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #f5f0e8;
  --dark:  #141f14;
  --green: #2a4a2a;
  --gold:  #b8963e;
  --mid:   #6b8c6b;
}

body {
  font-family: "PingFang SC", -apple-system, "Hiragino Sans GB", sans-serif;
  background: var(--cream);
  color: var(--dark);
  overflow-x: hidden;
}

/* ━━━━━━━━━━━━━━━━━━ DEMO BANNER ━━━━━━━━━━━━━━━━━━ */
.demo-banner {
  background: var(--gold);
  color: var(--dark);
  text-align: center;
  padding: 10px 20px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
}
.demo-banner a {
  color: var(--dark);
  text-decoration: underline;
  white-space: nowrap;
}

/* ━━━━━━━━━━━━━━━━━━ HERO ━━━━━━━━━━━━━━━━━━ */
.hero {
  position: relative;
  height: 100svh;
  min-height: 500px;
  overflow: hidden;
}
.hero-img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 40%;
}
.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(10,18,10,0.00) 0%,
    rgba(10,18,10,0.00) 40%,
    rgba(10,18,10,0.55) 100%
  );
}
.hero-content {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 40px 28px;
  color: white;
}
.hero-tag {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.75);
  margin-bottom: 12px;
}
.hero-title {
  font-size: clamp(36px, 8vw, 60px);
  font-weight: 300;
  letter-spacing: -0.5px;
  line-height: 1.1;
  margin-bottom: 16px;
}
.hero-title em {
  font-style: normal;
  font-weight: 700;
}
.hero-meta {
  display: flex;
  gap: 20px;
  font-size: 13px;
  color: rgba(255,255,255,0.80);
  align-items: center;
}
.hero-meta span { display: flex; align-items: center; gap: 6px; }
.hero-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.4); }
.scroll-hint {
  position: absolute;
  bottom: 32px; right: 28px;
  color: rgba(255,255,255,0.5);
  font-size: 11px;
  letter-spacing: 2px;
  writing-mode: vertical-rl;
  text-orientation: mixed;
}

/* ━━━━━━━━━━━━━━━━━━ DASHBOARD ━━━━━━━━━━━━━━━━━━ */
.section {
  padding: 48px 28px;
}
.section-label {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--mid);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-label::after {
  content: "";
  flex: 1;
  height: 1px;
  background: rgba(0,0,0,0.12);
}

.total-line {
  font-size: clamp(48px, 12vw, 80px);
  font-weight: 700;
  color: var(--green);
  line-height: 1;
  margin-bottom: 4px;
}
.total-sub {
  font-size: 14px;
  color: var(--mid);
  margin-bottom: 36px;
}

.cat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1px;
  background: rgba(0,0,0,0.10);
  border: 1px solid rgba(0,0,0,0.10);
}
.cat-cell {
  background: var(--cream);
  padding: 20px 16px;
}
.cat-cell-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}
.cat-name {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--mid);
}
.cat-num {
  font-size: 28px;
  font-weight: 700;
  color: var(--green);
  line-height: 1;
}
.cat-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  min-height: 20px;
}
.cat-tag {
  font-size: 11px;
  color: var(--green);
  background: rgba(42,74,42,0.08);
  padding: 3px 8px;
  border-radius: 2px;
}
.cat-empty {
  font-size: 11px;
  color: rgba(0,0,0,0.25);
  font-style: italic;
}

/* ━━━━━━━━━━━━━━━━━━ DIVIDER ━━━━━━━━━━━━━━━━━━ */
.photo-divider {
  width: 100%;
  height: 260px;
  overflow: hidden;
  position: relative;
}
.photo-divider-img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 60%;
}
.photo-divider-overlay {
  position: absolute;
  inset: 0;
  background: rgba(10,18,10,0.30);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}
.photo-divider-text {
  text-align: center;
}
.photo-divider-text p {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  opacity: 0.75;
  margin-bottom: 8px;
}
.photo-divider-text h2 {
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 2px;
}

/* ━━━━━━━━━━━━━━━━━━ FORM ━━━━━━━━━━━━━━━━━━ */
.form-section {
  background: var(--dark);
  color: var(--cream);
  padding: 48px 28px;
}
.form-section .section-label {
  color: rgba(255,255,255,0.4);
}
.form-section .section-label::after {
  background: rgba(255,255,255,0.15);
}

.field { margin-bottom: 28px; }
.field label {
  display: block;
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  margin-bottom: 10px;
}
.field input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.25);
  color: white;
  font-size: 16px;
  font-family: inherit;
  padding: 8px 0;
  outline: none;
  transition: border-color .2s;
  border-radius: 0;
}
.field input::placeholder { color: rgba(255,255,255,0.2); }
.field input:focus { border-bottom-color: rgba(255,255,255,0.8); }

.cat-choice {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-top: 0;
}
.cat-choice-btn {
  padding: 14px 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: transparent;
  color: rgba(255,255,255,0.55);
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  text-align: left;
  transition: all .2s;
  letter-spacing: 0.5px;
}
.cat-choice-btn .btn-icon { display: block; font-size: 18px; margin-bottom: 6px; }
.cat-choice-btn:hover {
  border-color: rgba(255,255,255,0.6);
  color: white;
}
.cat-choice-btn.selected {
  border-color: var(--gold);
  color: white;
  background: rgba(184,150,62,0.15);
}

.submit-btn {
  width: 100%;
  padding: 18px;
  background: var(--gold);
  color: var(--dark);
  border: none;
  font-size: 13px;
  font-family: inherit;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity .2s;
}
.submit-btn:hover { opacity: 0.85; }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ━━━━━━━━━━━━━━━━━━ LIST ━━━━━━━━━━━━━━━━━━ */
.list-section {
  padding: 48px 28px;
  background: var(--cream);
}
.cat-block { margin-bottom: 36px; }
.cat-block-title {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--mid);
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(0,0,0,0.10);
  margin-bottom: 0;
  display: flex;
  justify-content: space-between;
}
.list-row {
  display: flex;
  align-items: baseline;
  padding: 14px 0;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  gap: 12px;
}
.list-name { font-size: 14px; font-weight: 600; color: var(--dark); min-width: 60px; }
.list-food { font-size: 14px; color: var(--green); flex: 1; }
.list-qty { font-size: 12px; color: var(--mid); white-space: nowrap; }
.list-del {
  background: none; border: none;
  color: rgba(0,0,0,0.18); font-size: 16px;
  cursor: pointer; padding: 0 4px;
  transition: color .2s; flex-shrink: 0;
}
.list-del:hover { color: #c04040; }
.list-note { font-size: 11px; color: var(--mid); margin-top: 2px; padding: 0 0 8px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }

.list-empty { font-size: 13px; color: rgba(0,0,0,0.25); font-style: italic; padding: 20px 0; }

/* ━━━━━━━━━━━━━━━━━━ TOAST ━━━━━━━━━━━━━━━━━━ */
.toast {
  position: fixed;
  bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--dark); color: white;
  padding: 12px 24px; font-size: 13px; letter-spacing: 0.5px;
  z-index: 1000; opacity: 0; transition: opacity .3s;
  white-space: nowrap; pointer-events: none;
  max-width: 90vw; text-align: center;
}
.toast.show { opacity: 1; }
.toast.error { background: #c04040; }
</style>
</head>

<!-- ━━━━━━━━━━━━━━━━━━ FORM ━━━━━━━━━━━━━━━━━━ -->
<section class="form-section">
  <div class="section-label">登记</div>

  <div class="field">
    <label>你叫什么</label>
    <input type="text" id="inputName" placeholder="名字或昵称" maxlength="20">
  </div>
  <div class="field">
    <label>带什么</label>
    <input type="text" id="inputFood" placeholder="例：包子、西瓜、可乐…" maxlength="40">
  </div>
  <div class="field">
    <label>分类</label>
    <div class="cat-choice">
      <button class="cat-choice-btn" data-cat="主食" onclick="selectCat(this)"><span class="btn-icon">🍱</span>中式主食</button>
      <button class="cat-choice-btn" data-cat="饮料" onclick="selectCat(this)"><span class="btn-icon">🥤</span>饮料</button>
      <button class="cat-choice-btn" data-cat="零食水果" onclick="selectCat(this)"><span class="btn-icon">🍎</span>零食水果</button>
      <button class="cat-choice-btn" data-cat="甜点蛋糕" onclick="selectCat(this)"><span class="btn-icon">🍰</span>甜点蛋糕</button>
    </div>
  </div>
  <div class="field">
    <label>数量</label>
    <input type="text" id="inputQty" placeholder="例：10个、1个西瓜、2升" maxlength="20">
  </div>
  <div class="field">
    <label>备注（可选）</label>
    <input type="text" id="inputNote" placeholder="素食、辣、过敏提示…" maxlength="50">
  </div>

  <button class="submit-btn" onclick="submitSignup()" id="submitBtn">确认登记</button>
</section>

<!-- ━━━━━━━━━━━━━━━━━━ LIST ━━━━━━━━━━━━━━━━━━ -->
<section class="list-section">
  <div class="section-label">名单</div>
  <div id="listArea"></div>
</section>

<div class="toast" id="toast"></div>

<script>
const CATS     = ["主食","饮料","零食水果","甜点蛋糕"];
const CAT_ICON = {"主食":"🍱","饮料":"🥤","零食水果":"🍎","甜点蛋糕":"🍰"};

let allItems = [
  {id:"1", name:"张小明", food_item:"炸鸡",     category:"主食",   quantity:"20块",  note:null},
  {id:"2", name:"李美华", food_item:"可乐",     category:"饮料",   quantity:"6罐",   note:null},
  {id:"3", name:"小红",   food_item:"提拉米苏", category:"甜点蛋糕",quantity:"1整个", note:"自制"},
  {id:"4", name:"陈大力", food_item:"三明治",   category:"主食",   quantity:"10个",  note:"含素食款"},
  {id:"5", name:"Julia",  food_item:"橙汁",     category:"饮料",   quantity:"2瓶",   note:null},
  {id:"6", name:"Max",    food_item:"葡萄",     category:"零食水果",quantity:"2串",   note:null},
  {id:"7", name:"小豆",   food_item:"芒果",     category:"零食水果",quantity:"3个",   note:null},
  {id:"8", name:"王芳",   food_item:"饺子",     category:"主食",   quantity:"50个",  note:"猪肉白菜馅"},
  {id:"9", name:"Lena",   food_item:"柠檬水",   category:"饮料",   quantity:"1升",   note:"自制"},
  {id:"10",name:"小鱼",   food_item:"蛋糕卷",   category:"甜点蛋糕",quantity:"1整条", note:null},
];

let selectedCat = "";
let nextId = 11;

function renderDash() {
  document.getElementById("totalCount").textContent = allItems.length;
  CATS.forEach((cat, i) => {
    const items = allItems.filter(x => x.category === cat);
    document.getElementById("dc"+i).textContent = items.length;
    const box = document.getElementById("di"+i);
    box.innerHTML = items.length
      ? items.map(it => '<span class="cat-tag">'+esc(it.food_item)+'</span>').join("")
      : '<span class="cat-empty">暂无</span>';
  });
}

function renderList() {
  let html = "";
  CATS.forEach(cat => {
    const items = allItems.filter(i => i.category === cat);
    if (!items.length) return;
    html += '<div class="cat-block"><div class="cat-block-title"><span>'+CAT_ICON[cat]+' '+cat+'</span><span>'+items.length+' 人</span></div>';
    items.forEach(item => {
      html += '<div class="list-row">'
        + '<span class="list-name">'+esc(item.name)+'</span>'
        + '<span class="list-food">'+esc(item.food_item)+'</span>'
        + '<span class="list-qty">'+esc(item.quantity)+'</span>'
        + '<button class="list-del" data-id="'+item.id+'" data-name="'+esc(item.name)+'">×</button>'
        + '</div>';
      if (item.note) html += '<div class="list-note">💬 '+esc(item.note)+'</div>';
    });
    html += '</div>';
  });
  if (!html) html = '<p class="list-empty">还没有人登记，来第一个！</p>';
  document.getElementById("listArea").innerHTML = html;
}

function submitSignup() {
  const name = document.getElementById("inputName").value.trim();
  const food = document.getElementById("inputFood").value.trim();
  const qty  = document.getElementById("inputQty").value.trim();
  const note = document.getElementById("inputNote").value.trim();
  if (!name){ hilite("inputName"); return; }
  if (!food){ hilite("inputFood"); return; }
  if (!selectedCat){ showToast("请选择分类"); return; }
  if (!qty){ hilite("inputQty"); return; }

  allItems.push({
    id: String(nextId++),
    name, food_item: food, category: selectedCat, quantity: qty, note: note || null
  });

  showToast(name + " 已登记 ✓（演示模式，刷新后重置）");
  ["inputName","inputFood","inputQty","inputNote"].forEach(id => document.getElementById(id).value="");
  document.querySelectorAll(".cat-choice-btn").forEach(b => b.classList.remove("selected"));
  selectedCat = "";
  renderDash();
  renderList();
}

function deleteItem(id, nm) {
  allItems = allItems.filter(i => i.id !== id);
  showToast(nm + " 的登记已删除");
  renderDash();
  renderList();
}

function selectCat(btn) {
  document.querySelectorAll(".cat-choice-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  selectedCat = btn.dataset.cat;
}

function hilite(id) {
  const el = document.getElementById(id);
  el.style.borderBottomColor = "#e55555"; el.focus();
  setTimeout(() => el.style.borderBottomColor = "", 1500);
}

function showToast(msg, isErr) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isErr?" error":"");
  setTimeout(() => t.className = "toast", 3000);
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/'/g,"&#39;");
}

document.getElementById("listArea").addEventListener("click", function(e){
  const b = e.target.closest(".list-del");
  if (b) deleteItem(b.dataset.id, b.dataset.name);
});

renderDash();
renderList();
</script>
</body>
</html>
